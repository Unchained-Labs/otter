repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -lc '${CARGO_BIN:-$HOME/.cargo/bin/cargo} fmt --all'
        language: system
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -lc '${CARGO_BIN:-$HOME/.cargo/bin/cargo} clippy --workspace --all-targets -- -D warnings'
        language: system
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: bash -lc '${CARGO_BIN:-$HOME/.cargo/bin/cargo} test --workspace'
        language: system
        pass_filenames: false
      - id: cargo-audit
        name: cargo audit
        entry: bash -lc 'if ! command -v cargo-audit >/dev/null; then ${CARGO_BIN:-$HOME/.cargo/bin/cargo} install cargo-audit --locked; fi; ${CARGO_BIN:-$HOME/.cargo/bin/cargo} audit --ignore RUSTSEC-2023-0071'
        language: system
        pass_filenames: false
